<!DOCTYPE html>
<html lang="vi" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Share - Hệ thống quản lý và chia sẻ tài liệu trực tuyến</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontSize: {
            'xs': '0.75rem',     /* 12px */
            'sm': '0.8125rem',   /* 13px - chữ nhỏ vừa mắt */
            'base': '0.875rem',  /* 14px */
            'lg': '1rem',        /* 16px */
            'xl': '1.125rem',    /* 18px */
            '2xl': '1.25rem',    /* 20px */
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- PDF.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Tùy biến thanh cuộn nhỏ gọn */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .dark ::-webkit-scrollbar-thumb {
      background: #475569;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-700 dark:text-slate-300 transition-colors duration-200 text-sm flex flex-col min-h-screen overflow-y-scroll">

  <!-- HEADER -->
  <header class="sticky top-0 z-40 bg-white/90 dark:bg-slate-900/90 backdrop-blur border-b border-slate-200 dark:border-slate-800 transition-all">
    <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between gap-4">
      
      <!-- Logo -->
      <div class="flex items-center gap-2 cursor-pointer flex-shrink-0" onclick="navigate('home')">
        <div class="bg-blue-600 text-white p-1.5 rounded-lg shadow-sm">
          <i data-lucide="file-text" class="w-4 h-4"></i>
        </div>
        <div class="flex items-center gap-1">
          <span class="text-base font-black bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">PDF</span>
          <span class="text-base font-bold text-slate-800 dark:text-slate-200">Share</span>
        </div>
      </div>

      <!-- Tìm kiếm nhanh -->
      <form onsubmit="handleSearch(event)" class="hidden md:flex items-center flex-1 max-w-sm relative">
        <input 
          id="globalSearchInput"
          type="text" 
          placeholder="Tìm tài liệu, giáo trình..." 
          class="w-full pl-8 pr-3 py-1.5 bg-slate-100 dark:bg-slate-800 border border-transparent focus:border-blue-500 rounded-lg focus:outline-none text-xs text-slate-800 dark:text-slate-100"
        />
        <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400 absolute left-2.5"></i>
      </form>

      <!-- Hành động & Chế độ tối -->
      <div class="flex items-center gap-3 flex-shrink-0">
        <button onclick="navigate('home')" class="px-2 py-1.5 rounded text-xs font-semibold hover:text-blue-600 dark:hover:text-blue-400 transition-all">
          Trang chủ
        </button>

        <div class="relative group">
          <button class="px-2 py-1.5 rounded text-xs font-semibold hover:text-blue-600 dark:hover:text-blue-400 flex items-center gap-1 transition-all">
            Danh mục <i data-lucide="chevron-down" class="w-3 h-3"></i>
          </button>
          <div id="headerCategoryDropdown" class="absolute right-0 top-full mt-1 w-48 bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800 rounded-lg shadow-lg py-1 hidden group-hover:block z-50">
            <!-- Render danh mục -->
          </div>
        </div>

        <button onclick="toggleDarkMode()" class="p-1.5 bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 rounded-lg transition-all">
          <i data-lucide="moon" id="themeIcon" class="w-3.5 h-3.5"></i>
        </button>

        <!-- Admin Portal Button -->
        <div id="adminAuthButtonArea">
          <!-- Động đăng nhập / Dashboard -->
        </div>
      </div>
    </div>
  </header>

  <!-- TINY HERO BANNER (Cực nhỏ theo yêu cầu - Đã bỏ gợi ý Admin Demo) -->
  <section class="bg-slate-900 text-slate-100 border-b border-slate-800 py-3 px-4 shadow-inner">
    <div class="max-w-7xl mx-auto flex flex-col md:flex-row items-center justify-between gap-3">
      
      <!-- Trái: Tải Ultraview & Hotline -->
      <div class="flex flex-wrap items-center gap-4 text-xs w-full md:w-auto">
        <div class="flex items-center gap-1.5 text-blue-400 font-bold">
          <i data-lucide="sparkles" class="w-3.5 h-3.5 text-amber-400 animate-pulse"></i>
          <span>Hỗ Trợ Trực Tuyến:</span>
        </div>
        <a 
          href="https://www.ultraviewer.net/vi/UltraViewer_setup_6.6_vi.exe" 
          class="flex items-center gap-1 bg-blue-600 hover:bg-blue-500 text-white px-2.5 py-1 rounded font-bold transition-all shadow-sm"
          target="_blank"
        >
          <i data-lucide="download" class="w-3 h-3"></i> Tải Ultraviewer
        </a>
        <a 
          href="tel:19006134" 
          class="flex items-center gap-1 bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-slate-700 px-2.5 py-1 rounded font-bold transition-all"
        >
          <i data-lucide="phone" class="w-3 h-3"></i> Hotline: 19006134
        </a>
      </div>

      <!-- Phải: Đồng bộ bảo mật -->
      <div class="hidden md:flex items-center gap-2 text-xs text-slate-400">
        <span class="flex items-center gap-1 text-emerald-400">
          <span class="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
          Đường truyền bảo mật SSL
        </span>
      </div>

    </div>
  </section>

  <!-- MAIN DYNAMIC CONTENT (Cố định chiều cao vùng chứa tránh Layout Shift khi đổi Tab) -->
  <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6 flex flex-col justify-start" id="mainContainer">
    <div class="min-h-[580px] flex flex-col" id="app">
      <!-- Nơi render các view -->
      <div class="flex items-center justify-center py-32">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
      </div>
    </div>
  </main>

  <!-- FOOTER (Rút gọn tối đa - Cực kỳ tinh gọn, cố định chân trang) -->
  <footer class="bg-slate-900 text-slate-400 border-t border-slate-800 py-4 text-xs mt-auto">
    <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <i data-lucide="file-text" class="w-4 h-4 text-blue-500"></i>
        <span class="font-bold text-white">PDF Share Portal</span>
        <span>• © 2026 Toàn bộ tài liệu hỗ trợ tải xuống miễn phí</span>
      </div>
      <div class="flex flex-wrap items-center gap-4">
        <a href="https://www.ultraviewer.net/vi/UltraViewer_setup_6.6_vi.exe" class="hover:text-white transition-all inline-flex items-center gap-1 font-medium">
          <i data-lucide="download" class="w-3 h-3"></i> Tải Ultraviewer
        </a>
        <span class="text-slate-700">|</span>
        <a href="tel:19006134" class="text-emerald-400 hover:text-emerald-300 transition-all font-bold inline-flex items-center gap-1">
          <i data-lucide="phone" class="w-3.5 h-3.5"></i> Hotline hỗ trợ: 1900 6134
        </a>
        <span class="text-slate-700">|</span>
        <span id="sessionUidText" class="font-mono text-[10px]">UID: Loading...</span>
      </div>
    </div>
  </footer>

  <!-- MODAL: GỬI BÁO CÁO LỖI -->
  <div id="reportModal" class="fixed inset-0 bg-slate-950/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 w-full max-w-sm shadow-xl relative text-xs">
      <button onclick="closeReportModal()" class="absolute top-3 right-3 p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
      <h3 class="text-sm font-bold mb-3 flex items-center gap-1.5 text-rose-500">
        <i data-lucide="alert-triangle" class="w-4 h-4"></i> Báo cáo lỗi tài liệu
      </h3>
      <form id="reportForm" onsubmit="submitReport(event)" class="space-y-3">
        <input type="hidden" id="reportPdfId">
        <input type="hidden" id="reportPdfTitle">
        <div>
          <label class="block font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1">Chi tiết lỗi gặp phải</label>
          <textarea 
            required 
            rows="3" 
            id="reportReason" 
            placeholder="Ví dụ: Lỗi tải file, tài liệu mờ, hỏng trang..." 
            class="w-full border border-slate-200 dark:border-slate-700 rounded-lg p-2 bg-slate-50 dark:bg-slate-800 focus:outline-none focus:border-rose-500"
          ></textarea>
        </div>
        <button type="submit" class="w-full bg-rose-600 hover:bg-rose-500 text-white py-2 rounded-lg font-bold transition-all shadow-sm">
          Gửi báo cáo
        </button>
      </form>
    </div>
  </div>

  <!-- MODAL: ADMIN THÊM / SỬA CHUNG (Hỗ trợ cấu hình kích thước thích ứng) -->
  <div id="entityModal" class="fixed inset-0 bg-slate-950/60 hidden items-center justify-center p-4 z-50 backdrop-blur-sm overflow-y-auto">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-5 w-full max-w-md shadow-xl relative text-xs my-8">
      <button onclick="closeEntityModal()" class="absolute top-3 right-3 p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
        <i data-lucide="x" class="w-4 h-4"></i>
      </button>
      <h3 id="entityModalTitle" class="text-sm font-black mb-4">Sửa thông tin</h3>
      <div id="entityModalFormContainer">
        <!-- Điền động form -->
      </div>
    </div>
  </div>

  <!-- ========================================================================= -->
  <!-- FIREBASE & CORE LOGIC SCRIPT (ES MODULES) -->
  <!-- ========================================================================= -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { 
      getAuth, 
      signInWithCustomToken, 
      signInAnonymously, 
      onAuthStateChanged, 
      signInWithEmailAndPassword,
      signOut,
      updatePassword 
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { 
      getFirestore, 
      collection, 
      doc, 
      setDoc, 
      getDoc, 
      addDoc, 
      updateDoc, 
      deleteDoc, 
      onSnapshot, 
      increment 
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import {
      getStorage,
      ref,
      uploadBytesResumable,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";

    // --- Cấu hình Firebase Chính thức ---
    const firebaseConfig = {
      apiKey: "AIzaSyBxVjCofmTO3C6IZDynA91UUWZ6iEvj-RY",
      authDomain: "huongdanhotro-d56de.firebaseapp.com",
      projectId: "huongdanhotro-d56de",
      storageBucket: "huongdanhotro-d56de.firebasestorage.app",
      messagingSenderId: "651625894464",
      appId: "1:651625894464:web:b63d52413b5d278f2705a5",
      measurementId: "G-B6N72RHYC2"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'pdf-sharing-app';

    // --- States toàn cục ---
    let user = null;
    let isAdmin = false;
    let activeTab = 'home';
    let searchQuery = '';
    
    let categories = [];
    let pdfs = [];
    let reports = [];
    let bookmarks = JSON.parse(localStorage.getItem('pdf_bookmarks')) || [];

    // Bộ nhớ tạm thời khi xem PDF chi tiết
    let currentPdfObj = null;
    let currentPdfJsDoc = null;
    let pdfViewerPage = 1;
    let pdfViewerTotalPages = 1;
    let pdfViewerZoom = 1.0;

    // --- Khởi động Xác thực & Theo dõi State (RULE 3) ---
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else {
          await signInAnonymously(auth);
        }
      } catch (error) {
        console.error("Auth initialization error:", error);
      }
    };

    onAuthStateChanged(auth, (currentUser) => {
      user = currentUser;
      isAdmin = (currentUser && !currentUser.isAnonymous);
      
      // Hiển thị ID phiên truy cập
      document.getElementById('sessionUidText').textContent = `UID: ${currentUser ? currentUser.uid : 'Chưa kết nối'}`;

      // Khởi tạo các Listener Realtime
      if (currentUser) {
        setupRealtimeSubscriptions();
      }
    });

    // --- Realtime Subscriptions (RULE 1 & 2 - Đã bỏ articles) ---
    let unsubCategories, unsubPdfs, unsubReports;
    const setupRealtimeSubscriptions = () => {
      if (unsubCategories) unsubCategories();
      if (unsubPdfs) unsubPdfs();
      if (unsubReports) unsubReports();

      const catRef = collection(db, 'artifacts', appId, 'public', 'data', 'categories');
      const pdfsRef = collection(db, 'artifacts', appId, 'public', 'data', 'pdfs');
      const repRef = collection(db, 'artifacts', appId, 'public', 'data', 'reports');

      unsubCategories = onSnapshot(catRef, (snapshot) => {
        categories = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        categories.sort((a, b) => (a.order || 0) - (b.order || 0));
        renderDropdownCategories();
        renderCurrentView();
      }, (e) => console.error("Lỗi tải danh mục:", e));

      unsubPdfs = onSnapshot(pdfsRef, (snapshot) => {
        pdfs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCurrentView();
      }, (e) => console.error("Lỗi tải PDF:", e));

      unsubReports = onSnapshot(repRef, (snapshot) => {
        reports = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderCurrentView();
      }, (e) => console.error("Lỗi tải báo cáo:", e));
    };

    // --- NAVIGATION CONTROLLER ---
    window.navigate = (tab, targetId = null) => {
      activeTab = tab;
      window.scrollTo({ top: 0, behavior: 'smooth' });

      if (tab === 'pdf-detail' && targetId) {
        currentPdfObj = pdfs.find(p => p.id === targetId);
        if (currentPdfObj) {
          // Tăng lượt xem (Realtime)
          incrementViews(targetId);
          pdfViewerPage = 1;
          pdfViewerZoom = 1.0;
        }
      } else if (tab === 'category' && targetId) {
        window.selectedCategoryObj = categories.find(c => c.id === targetId);
      }

      renderCurrentView();
    };

    const incrementViews = async (pdfId) => {
      try {
        const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'pdfs', pdfId);
        await updateDoc(docRef, { views: increment(1) });
      } catch (e) {
        console.error("Lỗi tăng lượt xem:", e);
      }
    };

    // --- RENDER DROPDOWN DANH MỤC TRÊN HEADER ---
    const renderDropdownCategories = () => {
      const dropdown = document.getElementById('headerCategoryDropdown');
      if (!dropdown) return;
      if (categories.length === 0) {
        dropdown.innerHTML = `<p class="text-[11px] text-center text-slate-400 py-2">Không có danh mục</p>`;
        return;
      }
      dropdown.innerHTML = categories.map(cat => `
        <button 
          onclick="navigate('category', '${cat.id}')" 
          class="w-full text-left px-3 py-1.5 hover:bg-slate-50 dark:hover:bg-slate-800 text-xs flex items-center gap-2 text-slate-700 dark:text-slate-300"
        >
          <span class="w-2 h-2 rounded-full" style="background-color: ${cat.color || '#3B82F6'}"></span>
          <span class="truncate">${cat.name}</span>
        </button>
      `).join('');
    };

    // --- RENDER CURRENT VIEW ---
    const renderCurrentView = () => {
      const appEl = document.getElementById('app');
      renderAdminButton();

      switch(activeTab) {
        case 'home':
          appEl.innerHTML = renderHome();
          break;
        case 'category':
          appEl.innerHTML = renderCategory();
          break;
        case 'pdf-detail':
          appEl.innerHTML = renderPdfDetail();
          initPdfRenderer();
          break;
        case 'search':
          appEl.innerHTML = renderSearch();
          break;
        case 'admin-login':
          appEl.innerHTML = renderAdminLogin();
          break;
        case 'admin-dashboard':
          if (!isAdmin) {
            navigate('admin-login');
          } else {
            appEl.innerHTML = renderAdminDashboard();
          }
          break;
      }
      lucide.createIcons();
    };

    // --- RENDER VIEW CHỦ (HOME - Loại bỏ mới cập nhật & đọc nhiều nhất) ---
    const renderHome = () => {
      const featured = pdfs.filter(p => p.featured && p.status === 'public');

      return `
        <div class="space-y-8 flex-grow">
          <!-- Quick Stats Panel -->
          <div class="grid grid-cols-3 gap-4 bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm">
            <div class="text-center p-2 border-r border-slate-100 dark:border-slate-800">
              <span class="text-xl font-extrabold text-blue-600 dark:text-blue-400">${pdfs.length}</span>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Tài liệu</p>
            </div>
            <div class="text-center p-2 border-r border-slate-100 dark:border-slate-800">
              <span class="text-xl font-extrabold text-indigo-600 dark:text-indigo-400">${categories.length}</span>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Danh mục</p>
            </div>
            <div class="text-center p-2">
              <span class="text-xl font-extrabold text-emerald-600 dark:text-emerald-400">${pdfs.reduce((acc,p) => acc + (p.views || 0), 0)}</span>
              <p class="text-[10px] text-slate-500 font-bold uppercase tracking-wider">Lượt xem</p>
            </div>
          </div>

          <!-- Danh mục nổi bật -->
          <div>
            <h2 class="text-sm font-black mb-4 flex items-center gap-1.5"><i data-lucide="folder" class="w-4 h-4 text-blue-600"></i> Danh Mục Tài Liệu</h2>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
              ${categories.map(cat => `
                <div onclick="navigate('category', '${cat.id}')" class="bg-white dark:bg-slate-900 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shadow-sm hover:shadow-md cursor-pointer transition-all hover:-translate-y-0.5">
                  <div class="w-8 h-8 rounded-lg flex items-center justify-center font-bold text-white mb-2" style="background-color: ${cat.color || '#3B82F6'}">
                    ${cat.name.charAt(0)}
                  </div>
                  <h4 class="font-bold text-slate-900 dark:text-white truncate">${cat.name}</h4>
                  <p class="text-[11px] text-slate-400 mt-0.5">${pdfs.filter(p => p.categoryId === cat.id && p.status === 'public').length} tài liệu</p>
                </div>
              `).join('')}
            </div>
          </div>

          <!-- Tài liệu ghim tiêu biểu -->
          <div>
            <h2 class="text-sm font-black mb-4 flex items-center gap-1.5 text-amber-500"><i data-lucide="sparkles" class="w-4 h-4"></i> Tài Liệu Tiêu Biểu</h2>
            ${featured.length === 0 ? `
              <div class="text-center py-10 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl">
                <p class="text-slate-400 text-xs">Hiện tại chưa có tài liệu tiêu biểu nào được ghim.</p>
              </div>
            ` : `
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                ${featured.map(pdf => {
                  const cat = categories.find(c => c.id === pdf.categoryId);
                  return `
                    <div onclick="navigate('pdf-detail', '${pdf.id}')" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 flex gap-3 cursor-pointer hover:shadow transition-all">
                      <img src="${pdf.thumbnail}" class="w-16 h-24 object-cover rounded-lg bg-slate-100 flex-shrink-0" />
                      <div class="flex flex-col justify-between flex-grow min-w-0">
                        <div>
                          ${cat ? `<span class="text-[9px] font-bold px-1.5 py-0.5 rounded" style="background-color: ${cat.color}15; color: ${cat.color}">${cat.name}</span>` : ''}
                          <h3 class="font-bold text-xs text-slate-900 dark:text-white mt-1 line-clamp-2">${pdf.title}</h3>
                          <p class="text-[10px] text-slate-400 line-clamp-1 mt-0.5">${pdf.description || ''}</p>
                        </div>
                        <div class="flex items-center justify-between text-[10px] text-slate-400 mt-1">
                          <span class="flex items-center gap-1"><i data-lucide="eye" class="w-3.5 h-3.5"></i> ${pdf.views || 0}</span>
                          ${pdf.allowDownload ? `<span class="text-emerald-500 font-bold text-[9px]">Có thể tải</span>` : ''}
                        </div>
                      </div>
                    </div>
                  `;
                }).join('')}
              </div>
            `}
          </div>
        </div>
      `;
    };

    // --- RENDER DANH MỤC (CategoryView) ---
    const renderCategory = () => {
      const category = window.selectedCategoryObj;
      if (!category) return `<p class="text-center text-slate-400 py-10">Danh mục không tồn tại</p>`;

                  <i data-lucide="bookmark" class="w-3.5 h-3.5 ${bookmarks.includes(pdf.id) ? 'text-amber-500 fill-amber-500' : ''}"></i> <span>Yêu thích</span>

              ${pdf.allowDownload ? `

                  <i data-lucide="download" class="w-3.5 h-3.5"></i> Tải PDF Xuống

                <div class="bg-amber-500/10 border border-amber-500/20 text-amber-600 dark:text-amber-400 rounded-lg p-2.5 text-[11px] font-medium leading-relaxed">
                  Quản trị viên đã khóa chức năng tải xuống trực tiếp đối với giáo trình này. Chỉ hỗ trợ đọc trực tiếp.

              <button onclick="openReportModal('${pdf.id}', '${pdf.title.replace(/'/g, "\\'")}')" class="w-full text-center text-slate-400 hover:text-rose-500 text-[10px] pt-3 border-t border-slate-100 dark:border-slate-800/60 flex items-center justify-center gap-1">
                <i data-lucide="alert-triangle" class="w-3 h-3"></i> Báo cáo lỗi tài liệu này
              </button>
            </div>
          </div>

          <!-- Reader PDF.js Area -->
          <div class="w-full lg:w-2/3 flex flex-col space-y-3">
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 shadow-sm flex flex-col justify-between">
              
              <!-- Toolbar -->
              <div class="flex flex-wrap items-center justify-between gap-2 border-b border-slate-100 dark:border-slate-800 pb-3 mb-3">
                <div class="flex items-center gap-1.5 text-xs font-bold text-slate-900 dark:text-white">
                  <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i> Trình đọc PDF.js
                </div>
                <div class="flex items-center gap-1">
                  <!-- Thu phóng -->
                  <button onclick="changePdfZoom(-0.1)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded"><i data-lucide="zoom-out" class="w-3.5 h-3.5"></i></button>
                  <span class="text-xs font-bold font-mono px-1.5" id="zoomPercentage">100%</span>
                  <button onclick="changePdfZoom(0.1)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded"><i data-lucide="zoom-in" class="w-3.5 h-3.5"></i></button>

                  <span class="text-xs font-bold font-mono" id="pageNumberDisplay">Trang 1 / 1</span>
                  <button onclick="changePdfPage(1)" class="p-1 hover:bg-slate-100 dark:hover:bg-slate-800 rounded"><i data-lucide="chevron-right" class="w-3.5 h-3.5"></i></button>
                </div>
              </div>

              <!-- Canvas Container -->
              <div class="bg-slate-100 dark:bg-slate-950 rounded-lg p-3 overflow-auto flex items-center justify-center border border-slate-200 dark:border-slate-800 relative min-h-[500px]" id="pdfCanvasWrapper">

                <div id="pdfLoadingIndicator" class="absolute inset-0 bg-slate-900/5 backdrop-blur-[1px] hidden items-center justify-center">

                <span>Mẹo: Tự động tải chế độ trực tuyến dự phòng nếu file hiển thị lỗi.</span>
                <a href="https://docs.google.com/viewer?url=${encodeURIComponent(pdf.pdfUrl)}&embedded=true" target="_blank" class="text-blue-500 hover:underline inline-flex items-center gap-0.5">
                  Mở Google Viewer <i data-lucide="external-link" class="w-2.5 h-2.5"></i>

          </div>

    // --- KHỞI CHẠY BỘ ĐỌC PDF.JS ---
    const initPdfRenderer = () => {
      const pdf = currentPdfObj;
      if (!pdf) return;

      const loadingIndicator = document.getElementById('pdfLoadingIndicator');
      if (loadingIndicator) loadingIndicator.style.display = 'flex';

      window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
      
      const loadingTask = window.pdfjsLib.getDocument(pdf.pdfUrl);
      loadingTask.promise.then((pdfDoc) => {
        currentPdfJsDoc = pdfDoc;
        pdfViewerTotalPages = pdfDoc.numPages;
        renderPdfPage();
      }).catch(err => {
        console.error("Không tải được PDF:", err);
        // Fallback: vẽ bảng báo lỗi vào canvas hoặc gợi ý mở link trực tiếp
        const canvas = document.getElementById('pdfReaderCanvas');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          canvas.width = 400;
          canvas.height = 150;
          ctx.fillStyle = "#ef4444";
          ctx.font = "bold 13px Inter";
          ctx.fillText("Không thể kết xuất PDF trực tiếp qua CORS.", 20, 50);
          ctx.fillStyle = "#475569";
          ctx.font = "11px Inter";
          ctx.fillText("Vui lòng tải xuống hoặc sử dụng liên kết Google Viewer dự phòng.", 20, 80);
        }
        if (loadingIndicator) loadingIndicator.style.display = 'none';
      });
    };

    const renderPdfPage = () => {
      if (!currentPdfJsDoc) return;
      const canvas = document.getElementById('pdfReaderCanvas');
      if (!canvas) return;
      const ctx = canvas.getContext('2d');

      const loadingIndicator = document.getElementById('pdfLoadingIndicator');
      if (loadingIndicator) loadingIndicator.style.display = 'flex';

      currentPdfJsDoc.getPage(pdfViewerPage).then(page => {
        const viewport = page.getViewport({ scale: pdfViewerZoom });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };
        page.render(renderContext).promise.then(() => {
          if (loadingIndicator) loadingIndicator.style.display = 'none';
          document.getElementById('zoomPercentage').textContent = `${Math.round(pdfViewerZoom * 100)}%`;
          document.getElementById('pageNumberDisplay').textContent = `Trang ${pdfViewerPage} / ${pdfViewerTotalPages}`;
        });
      });
    };

    window.changePdfPage = (dir) => {
      const next = pdfViewerPage + dir;
      if (next >= 1 && next <= pdfViewerTotalPages) {
        pdfViewerPage = next;
        renderPdfPage();
      }
    };

    window.changePdfZoom = (val) => {
      const next = pdfViewerZoom + val;
      if (next >= 0.5 && next <= 2.0) {
        pdfViewerZoom = next;
        renderPdfPage();
      }
    };

    // --- BOOKMARK CONTROLLER ---
    window.toggleLocalBookmark = (pdfId) => {
      if (bookmarks.includes(pdfId)) {
        bookmarks = bookmarks.filter(id => id !== pdfId);
      } else {
        bookmarks.push(pdfId);
      }
      localStorage.setItem('pdf_bookmarks', JSON.stringify(bookmarks));
      renderCurrentView();
    };

    window.copyPdfShareLink = () => {
      const shareUrl = window.location.href;
      const el = document.createElement('textarea');
      el.value = shareUrl;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
      alert("Đã sao chép đường dẫn tài liệu vào bộ nhớ tạm!");
    };

    // --- SEARCH CONTROLLER ---
    window.handleSearch = (e) => {
      e.preventDefault();
      searchQuery = document.getElementById('globalSearchInput').value;
      navigate('search');
    };

    const renderSearch = () => {
      const results = pdfs.filter(pdf => {
        if (pdf.status !== 'public') return false;
        return pdf.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
               pdf.description.toLowerCase().includes(searchQuery.toLowerCase());
      });

      return `
        <div>
          <div class="mb-6">
            <h1 class="text-sm font-black flex items-center gap-1.5"><i data-lucide="search" class="w-4 h-4"></i> Kết quả tìm kiếm cho: "${searchQuery}"</h1>
            <p class="text-[11px] text-slate-400 mt-1">Tìm thấy ${results.length} tài liệu tương thích</p>
          </div>

          ${results.length === 0 ? `
            <div class="text-center py-16 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
              <p class="text-slate-400">Không tìm thấy tài liệu phù hợp.</p>
            </div>
          ` : `
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-4">
              ${results.map(pdf => `
                <div onclick="navigate('pdf-detail', '${pdf.id}')" class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-3 cursor-pointer hover:shadow transition-all flex flex-col justify-between h-full">
                  <div>
                    <img src="${pdf.thumbnail}" class="w-full h-32 object-cover rounded-lg bg-slate-100 mb-2" />
                    <h4 class="font-bold text-xs text-slate-900 dark:text-white line-clamp-2">${pdf.title}</h4>
                  </div>
                  <div class="flex items-center justify-between text-[10px] text-slate-400 mt-3 pt-2 border-t border-slate-100 dark:border-slate-800/60">
                    <span class="flex items-center gap-0.5"><i data-lucide="eye" class="w-3 h-3"></i> ${pdf.views || 0}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      `;
    };

    // --- ADMIN AUTH BUTTON CONTROLLER ---
    const renderAdminButton = () => {
      const container = document.getElementById('adminAuthButtonArea');
      if (!container) return;

      if (isAdmin) {
        container.innerHTML = `
          <button onclick="navigate('admin-dashboard')" class="flex items-center gap-1 bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm shadow-emerald-500/10 transition-all">
            <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>

            <i data-lucide="lock" class="w-3.5 h-3.5"></i>
            <span>Đăng nhập Admin</span>
          </button>

      }

    // --- TRANG ĐĂNG NHẬP ADMIN ---
    const renderAdminLogin = () => {
      return `
        <div class="max-w-sm mx-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-5 rounded-xl shadow-md space-y-4 text-xs">
          <div class="text-center">
            <div class="bg-blue-600 text-white p-2.5 rounded-xl inline-flex mb-2">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </div>
            <h2 class="text-sm font-black">Xác thực Quản trị viên</h2>
            <p class="text-[10px] text-slate-400 mt-0.5">Nhập tài khoản Firebase của bạn để quản lý</p>

          <form id="adminLoginForm" onsubmit="window.handleAdminLogin(event)" class="space-y-3">

        await signInWithEmailAndPassword(auth, email, pass);

    // --- BẢNG ĐIỀU KHIỂN DASHBOARD ADMIN ---
    window.adminActiveSubTab = 'statistics';

    const renderAdminDashboard = () => {
      return `
        <div class="flex flex-col md:flex-row gap-6 min-h-[500px]">

                <button onclick="setAdminSubTab('statistics')" class="w-full flex items-center justify-between p-2 rounded-lg font-semibold transition-all ${window.adminActiveSubTab === 'statistics' ? 'bg-blue-600 text-white shadow-sm' : 'hover:bg-slate-50 dark:hover:bg-slate-800'}">
                  <span class="flex items-center gap-1.5"><i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> Thống kê</span>

                  <span class="flex items-center gap-1.5"><i data-lucide="file-text" class="w-3.5 h-3.5"></i> Quản lý PDF</span>
                </button>
                <button onclick="setAdminSubTab('categories')" class="w-full flex items-center justify-between p-2 rounded-lg font-semibold transition-all ${window.adminActiveSubTab === 'categories' ? 'bg-blue-600 text-white shadow-sm' : 'hover:bg-slate-50 dark:hover:bg-slate-800'}">
                  <span class="flex items-center gap-1.5"><i data-lucide="folder" class="w-3.5 h-3.5"></i> Danh mục</span>
                </button>
                <button onclick="setAdminSubTab('reports')" class="w-full flex items-center justify-between p-2 rounded-lg font-semibold transition-all ${window.adminActiveSubTab === 'reports' ? 'bg-blue-600 text-white shadow-sm' : 'hover:bg-slate-50 dark:hover:bg-slate-800'}">
                  <span class="flex items-center gap-1.5"><i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Báo lỗi (${reports.length})</span>

    // --- NỘI DUNG CHI TIẾT TỪNG TAB TRONG DASHBOARD (Thiết kế lại hoàn toàn trang chủ Quản trị) ---

                <div class="text-[10px] bg-emerald-500/10 text-emerald-500 font-bold px-2 py-0.5 rounded-full flex items-center gap-1">
                  <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping"></span> Live
                </div>

    // --- HÀM TRỢ GIÚP UPLOAD LÊN STORAGE ---
    const uploadFileToStorage = (file, folderPath) => {
      return new Promise((resolve, reject) => {
        const fileRef = ref(storage, `${appId}/${folderPath}/${Date.now()}_${file.name}`);
        const uploadTask = uploadBytesResumable(fileRef, file);
        
        // Hiện progress bar tương ứng trong form
        const progressContainer = document.getElementById('uploadProgressArea');
        const progressBar = document.getElementById('uploadProgressBar');
        const progressText = document.getElementById('uploadProgressText');
        
        if (progressContainer) progressContainer.classList.remove('hidden');

        uploadTask.on('state_changed', 
          (snapshot) => {
            const percent = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
            if (progressBar) progressBar.style.width = percent + '%';
            if (progressText) progressText.textContent = `Đang tải lên Storage: ${Math.round(percent)}%`;
          }, 
          (error) => {
            console.error("Upload error:", error);
            if (progressContainer) progressContainer.classList.add('hidden');
            reject(error);
          }, 
          () => {
            getDownloadURL(uploadTask.snapshot.ref).then((downloadURL) => {
              if (progressContainer) progressContainer.classList.add('hidden');
              resolve(downloadURL);
            });
          }
        );
      });
    };

        docClass.remove('dark');
        localStorage.setItem('theme', 'light');
        themeIcon.setAttribute('data-lucide', 'moon');

        docClass.add('dark');

        themeIcon.setAttribute('data-lucide', 'sun');

  <!-- Helper tạo slug viết gọn bằng JS -->
  <script>
    const generateSlug = (text) => {
      return text
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '') // Xóa dấu tiếng Việt
        .replace(/[đĐ]/g, 'd')
        .replace(/([^0-9a-z-\s])/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+/, '')
        .replace(/-+$/, '');
    };
  </script>
